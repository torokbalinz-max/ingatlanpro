<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IngatlanPro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-quartz.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Leaflet -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Saját CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- FEJLÉC -->
    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container-fluid">

            <span class="navbar-brand mb-0 h1">
                <i class="fa-solid fa-building"></i>
                IngatlanPro
            </span>

            <button class="btn btn-outline-light">
                🌙 Sötét mód
            </button>

        </div>
    </nav>

    <div class="container-fluid mt-4">

        <div class="row">

            <!-- BAL OLDALI MENÜ -->
            <div class="col-lg-3">

                <div class="card shadow mb-4">

                    <div class="card-header">

                            <h4>
                                <i class="fa-solid fa-bars"></i>
                                         Menü
                            </h4>

                    </div>

                    <div class="card-body">
                        <div class="list-group mb-4">

    <button class="list-group-item list-group-item-action active"
            id="menuDashboard">
        🏠 Dashboard
    </button>

    <button class="list-group-item list-group-item-action"
            id="menuIngatlanok">
        📋 Ingatlanok
    </button>

    <button class="list-group-item list-group-item-action"
            id="menuUj">
        ➕ Új ingatlan
    </button>

    <button class="list-group-item list-group-item-action"
            id="menuStatisztika">
        📊 Statisztikák
    </button>

</div>

<hr>

    <div class="mb-3">
        <label class="form-label">Minimum ár (€)</label>
        <input type="number" class="form-control" id="minAr">
    </div>

    <div class="mb-3">
        <label class="form-label">Maximum ár (€)</label>
        <input type="number" class="form-control" id="maxAr">
    </div>

    <hr>

    <div class="mb-3">
        <label class="form-label">Minimum nm</label>
        <input type="number" class="form-control" id="minNm">
    </div>

    <div class="mb-3">
        <label class="form-label">Maximum nm</label>
        <input type="number" class="form-control" id="maxNm">
    </div>

    <hr>

    <div class="mb-3">
        <label class="form-label">Minimum szobák</label>
        <input type="number" class="form-control" id="minSzoba">
    </div>

    <hr>

    <label class="form-label">Állapot</label>

    <select class="form-select mb-3" id="allapot">

        <option value="">Mindegy</option>

        <option>felújítandó</option>

        <option>jó</option>

        <option>újszerű</option>

        <option>luxus</option>

    </select>

    <button class="btn btn-primary w-100" id="keresesBtn">

        🔍 Keresés

    </button>

</div>

                </div>

            </div>

            <!-- JOBB OLDAL -->
            <div class="col-lg-9">
            <div id="pageDashboard">

                <!-- Dashboard -->

                <div class="row">

                    <div class="col-md-3">

                        <div class="card shadow text-center p-3">

                            <h5>Összes ingatlan</h5>

                            <h2 id="dbCount">0</h2>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card shadow text-center p-3">

                            <h5>Átlag ár</h5>

                            <h2 id="dbPrice">0</h2>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card shadow text-center p-3">

                            <h5>Átlag ár/nm</h5>

                            <h2 id="dbNm">0</h2>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card shadow text-center p-3">

                            <h5>Eladva</h5>

                            <h2 id="dbSold">0</h2>

                        </div>

                    </div>

                </div>

                <!-- Táblázat -->

                <div class="row mt-4">

    <!-- Táblázat -->

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-header">

                <h4>
                    <i class="fa-solid fa-table"></i>
                    Ingatlanok
                </h4>

            </div>

            <div class="card-body">

                <div id="ingatlanGrid"
                     class="ag-theme-quartz"
                     style="height:700px;width:100%;">
                </div>

            </div>

        </div>

    </div>

    <!-- Adatlap -->

    <div class="col-lg-4">

        <div class="card shadow">

            <div class="card-header">

                <h4>

                    <i class="fa-solid fa-house"></i>

                    Ingatlan adatai

                </h4>

            </div>

            <div class="card-body">

                <h3 id="detailId">Nincs kiválasztva</h3>

                <hr>

                <p><b>💰 Ár:</b> <span id="detailAr">-</span></p>

                <p><b>📐 Nm:</b> <span id="detailNm">-</span></p>

                <p><b>🛏 Szobák:</b> <span id="detailSzoba">-</span></p>

                <p><b>🏢 Emelet:</b> <span id="detailEmelet">-</span></p>

                <p><b>🔧 Állapot:</b> <span id="detailAllapot">-</span></p>

                <hr>

                <a
                    id="detailLink"
                    class="btn btn-primary w-100"
                    target="_blank">

                    Megnyitás

                </a>

            </div>

        </div>

    </div>

</div>
</div>
<div id="pageNew" style="display:none;">

<div class="card shadow mt-4">

<div class="card-header">

<h3>
➕ Új ingatlan
</h3>

</div>

<div class="card-body">

<div class="mb-3">

<label>Link</label>

<input
type="text"
id="ujLink"
class="form-control">

</div>

<div class="mb-3">

<label>Ár (€)</label>

<input
type="number"
id="ujAr"
class="form-control">

</div>

<div class="mb-3">

<label>Nm</label>

<input
type="number"
id="ujNm"
class="form-control">

</div>

<div class="mb-3">

<label>Szobák</label>

<input
type="number"
id="ujSzobak"
class="form-control">

</div>

<div class="mb-3">

<label>Állapot</label>

<select
id="ujAllapot"
class="form-select">

<option>újszerű</option>

<option>jó</option>

<option>felújítandó</option>

</select>

</div>

<button
class="btn btn-success">

💾 Mentés

</button>

</div>

</div>

</div>

                <!-- Térkép -->

                <div class="card shadow mt-4">

                    <div class="card-header">

                        <h4>

                            <i class="fa-solid fa-map-location-dot"></i>

                            Térkép

                        </h4>

                    </div>

                    <div class="card-body">

                        <div id="map"></div>

                    </div>

                </div>

            </div>

        </div>

    </div>
   
   <!-- Könyvtárak -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- Saját modulok -->
<script src="js/dataManager.js"></script>
<script src="js/tableManager.js"></script>
<script src="js/mapManager.js"></script>
<script src="js/dashboardManager.js"></script>
<script src="js/filterManager.js"></script>
<script src="js/pageManager.js"></script>
<script src="js/appController.js"></script>
<script src="js/uiManager.js"></script>
<script src="js/scoreManager.js"></script>
<script src="js/app.js"></script>

</body>
</html>
