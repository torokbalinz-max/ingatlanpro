<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IngatlanPro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-quartz.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Leaflet -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Saját CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ===================== NAVBAR ===================== -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="#">

            <i class="fa-solid fa-building"></i>

            IngatlanPro

        </a>

        <div class="d-flex">

           <button class="btn btn-outline-light" id="btnDarkMode">
    🌙 Sötét mód
</button> 

        </div>

    </div>

</nav>

<!-- ===================== TARTALOM ===================== -->

<div class="container-fluid mt-4">

<div class="row">

<!-- ===================== BAL MENÜ ===================== -->

<div class="col-lg-3">

<div class="card shadow">

<div class="card-header">

<h4>

<i class="fa-solid fa-bars"></i>

Menü

</h4>

</div>

<div class="card-body">

<div class="list-group mb-4">

<button
id="menuDashboard"
class="list-group-item list-group-item-action active">

🏠 Dashboard

</button>

<button
id="menuIngatlanok"
class="list-group-item list-group-item-action">

📋 Ingatlanok

</button>

<button
id="menuUj"
class="list-group-item list-group-item-action">

➕ Új ingatlan

</button>

<button
id="menuStatisztika"
class="list-group-item list-group-item-action">

📊 Statisztikák

</button>

</div>
<hr>

<h5>

🔍 Keresés

</h5>

<div class="mb-3">

<label class="form-label">

Minimum ár

</label>

<input
id="minAr"
class="form-control"
type="number">

</div>

<div class="mb-3">

<label class="form-label">

Maximum ár

</label>

<input
id="maxAr"
class="form-control"
type="number">

</div>

<div class="mb-3">

<label class="form-label">

Minimum nm

</label>

<input
id="minNm"
class="form-control"
type="number">

</div>

<div class="mb-3">

<label class="form-label">

Maximum nm

</label>

<input
id="maxNm"
class="form-control"
type="number">

</div>

<div class="mb-3">

<label class="form-label">

Minimum szobák

</label>

<input
id="minSzoba"
class="form-control"
type="number">

</div>
<div class="mb-3">

    <label class="form-label">

        Minimum emelet

    </label>

    <input
        id="minEmelet"
        class="form-control"
        type="number">

</div>

<div class="mb-3">

<label class="form-label">

Állapot

</label>

<select
id="allapot"
class="form-select">

<option value="">Mindegy</option>

<option>felújítandó</option>

<option>jó</option>

<option>újszerű</option>

<option>luxus</option>

</select>

</div>

<button
id="keresesBtn"
class="btn btn-primary w-100">

🔍 Keresés

</button>

</div>

</div>

</div>

<!-- ===================== JOBB OLDAL ===================== -->

<div class="col-lg-9">
           <!-- ===================== DASHBOARD ===================== -->

<div id="pageDashboard">

<div class="row">

    <div class="col-md-3">

        <div class="card shadow text-center">

            <div class="card-body">

                <h6>🏠 Összes ingatlan</h6>

                <h2 id="dbCount">0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow text-center">

            <div class="card-body">

                <h6>💰 Átlag ár</h6>

                <h2 id="dbPrice">0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow text-center">

            <div class="card-body">

                <h6>📐 Átlag €/nm</h6>

                <h2 id="dbNm">0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow text-center">

            <div class="card-body">

                <h6>✅ Eladva</h6>

                <h2 id="dbSold">0</h2>

            </div>

        </div>

    </div>

</div>

<!-- ===================== TÁBLÁZAT + ADATLAP ===================== -->

<div class="row mt-4" id="mainContent">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-header">

                <h4>
                    <i class="fa-solid fa-table"></i>
                    Ingatlanok
                </h4>

            </div>

            <div class="card-body">

                <div
                    id="ingatlanGrid"
                    class="ag-theme-quartz"
                    style="height:700px;width:100%;">
                </div>

            </div>

        </div>

    </div>

    <div class="col-lg-4">

        <div class="card shadow">

            <div class="card-header">

                <h4>

                    <i class="fa-solid fa-house"></i>

                    Ingatlan adatai

                </h4>

            </div>

            <div class="card-body">

                <h3 id="detailId">
                    Nincs kiválasztva
                </h3>

                <hr>

                <p>
                    <b>💰 Ár:</b>
                    <span id="detailAr">-</span>
                </p>

                <p>
                    <b>📐 Nm:</b>
                    <span id="detailNm">-</span>
                </p>

                <p>
                    <b>🛏 Szobák:</b>
                    <span id="detailSzoba">-</span>
                </p>

                <p>
                    <b>🏢 Emelet:</b>
                    <span id="detailEmelet">-</span>
                </p>

                <p>
                    <b>🔧 Állapot:</b>
                    <span id="detailAllapot">-</span>
                </p>

                <hr>

                <a
                    id="detailLink"
                    target="_blank"
                    class="btn btn-primary w-100">

                    Megnyitás

                </a>

                <button
                    id="btnEdit"
                    class="btn btn-warning w-100 mt-2">

                    ✏️ Ingatlan szerkesztése

                </button>

                <hr>

                <button
                    id="btnDelete"
                    class="btn btn-danger w-100">

                    🗑️ Ingatlan törlése

                </button>

                <button
                    id="btnSaveStatistics"
                    class="btn btn-success w-100 mt-2">

                    💾 Piaci állapot mentése

                </button>

            </div>

        </div>

    </div>

</div>
<!-- ===================== TÉRKÉP ===================== -->
 

<div class="card shadow mt-4">

    <div class="card-header">

        <h4>

            <i class="fa-solid fa-map-location-dot"></i>

            Térkép

        </h4>

    </div>

    <div class="card-body">

        <div id="map" style="height:600px;"></div>

    </div>

</div>

</div>
<!-- ===== Dashboard vége ===== -->
<div id="pageStatistics" class="page" style="display:none;">

    <h2>📊 Piaci statisztikák</h2>

    <div class="statisticsTabs">

        <button id="btnCurrentStatistics">
            📈 Jelenlegi piac
        </button>

        <button id="btnHistoryStatistics">
            🕒 Piaci előzmények
        </button>

        <button id="btnCompareStatistics">
            📊 Piaci összehasonlítás
        </button>

        <button id="btnTrend">
            📈 Ártrend
        </button>

    </div>

    <hr>

    <div id="statisticsContainer"></div>

</div>

<!-- ===================== ÚJ INGATLAN ===================== -->

<div id="pageNew" style="display:none;">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>

➕ Új ingatlan felvétele

</h3>

</div>


    

<div class="card-body">

<div class="row">

<div class="col-md-6">

<div class="mb-3">

<label class="form-label">

Link

</label>

<input
id="ujLink"
type="text"
class="form-control">

</div>

</div>

<div class="col-md-3">

<div class="mb-3">

<label class="form-label">

Ár (€)

</label>

<input
id="ujAr"
type="number"
class="form-control">

</div>

</div>

<div class="col-md-3">

<div class="mb-3">

<label class="form-label">

Nm

</label>

<input
id="ujNm"
type="number"
class="form-control">

</div>

</div>

</div>

<div class="row">

<div class="col-md-4">

<div class="mb-3">

<label class="form-label">

Szobák

</label>

<input
id="ujSzobak"
type="number"
class="form-control">

</div>

</div>

<div class="col-md-4">

<div class="mb-3">

<label class="form-label">

Emelet

</label>

<input
id="ujEmelet"
type="text"
class="form-control">

</div>

</div>
<div class="row">

    <div class="col-md-6">

        <label>Összes emelet</label>

        <input
            id="ujOsszEmelet"
            type="number"
            class="form-control">

    </div>

</div>

<br>

<div class="col-md-4">

<div class="mb-3">

<label class="form-label">

Állapot

</label>

<select
id="ujAllapot"
class="form-select">

<option>újszerű</option>
<option>jó</option>
<option>felújítandó</option>
<option>luxus</option>

</select>

</div>

</div>

</div>

<hr>

<div class="row">

<div class="col-md-6">

<label>X koordináta</label>

<input
id="ujX"
type="hidden">

</div>

<div class="col-md-6">

<label>Y koordináta</label>

<input
id="ujY"
type="hidden">

</div>

</div>

<hr>

<h5>📍 Hely kiválasztása</h5>

<div id="newMap" style="height:400px;border-radius:10px;"></div>

<hr>

<div class="d-grid">

<button
id="btnSave"
class="btn btn-success btn-lg">

💾 Ingatlan mentése

</button>

</div>

</div>

</div>

</div>

</div>

</div>
   
   <!-- Könyvtárak -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Saját modulok -->
<script src="js/dataManager.js"></script>
<script src="js/tableManager.js"></script>
<script src="js/mapManager.js"></script>
<script src="js/dashboardManager.js"></script>
<script src="js/filterManager.js"></script>
<script src="js/newPropertyManager.js"></script>
<script src="js/pageManager.js"></script>
<script src="js/appController.js"></script>
<script src="js/scoreManager.js"></script>
<script src="js/newPropertyMap.js"></script>

<!-- Statistics -->
<script src="js/statistics/dashboardStatistics.js"></script>
<script src="js/statistics/stateStatistics.js"></script>
<script src="js/statistics/roomStatistics.js"></script>
<script src="js/statistics/floorStatistics.js"></script>
<script src="js/statistics/chartStatistics.js"></script>
<script src="js/statistics/currentStatistics.js"></script>
<script src="js/statistics/historyStatistics.js"></script>
<script src="js/statistics/compareStatistics.js"></script>
<script src="js/statistics/trendStatistics.js"></script>
<script src="js/statisticsManager.js"></script>

<!-- UI -->
<script src="js/uiManager.js"></script>

<!-- App -->
<script src="js/app.js"></script>

</body>
</html>
